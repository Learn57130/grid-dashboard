<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>grid_strike — guide</title>
<style>
  :root{--bg:#0a0e0f;--panel:#111819;--p2:#0e1415;--line:#1e2a2c;--line2:#2a3a3c;--tx:#cdd8d5;--mut:#6d817d;--dim:#4a5b58;--mint:#34d399;--mint2:#5eead4;--red:#f87171;--amber:#fbbf24;--blue:#60a5fa;--mono:ui-monospace,"SF Mono",Menlo,Monaco,"Cascadia Code",monospace}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--tx);font:14px/1.6 var(--mono);font-variant-numeric:tabular-nums;-webkit-font-smoothing:antialiased}
  a{color:var(--mint2);text-decoration:none}
  .wrap{max-width:1080px;margin:0 auto;padding:20px 22px 80px}
  header{display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:20px;flex-wrap:wrap}
  .ttl{font-size:15px;font-weight:600}.ttl .b{color:var(--mint)}
  .tag{font-size:10px;color:var(--mut);border:1px solid var(--line2);padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.09em}
  .sp{flex:1}
  .back{font-size:12px;color:var(--mut);border:1px solid var(--line2);padding:5px 11px;border-radius:6px}
  .back:hover{border-color:var(--mint);color:var(--mint2)}
  .app{display:grid;grid-template-columns:212px 1fr;gap:22px;align-items:start}
  @media(max-width:720px){.app{grid-template-columns:1fr}}
  .side{position:sticky;top:16px;border:1px solid var(--line);border-radius:8px;background:var(--panel);padding:9px;max-height:calc(100vh - 40px);overflow:auto}
  @media(max-width:720px){.side{position:static;max-height:none}}
  .side .g{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.09em;margin:13px 8px 5px}
  .side .g:first-child{margin-top:2px}
  .side a{display:block;font-size:12.5px;color:var(--mut);padding:5px 9px;border-radius:5px;cursor:pointer;border-left:2px solid transparent;word-break:break-word}
  .side a:hover{color:var(--tx);background:var(--p2)}
  .side a.on{color:var(--mint2);background:var(--p2);border-left-color:var(--mint)}
  .crumb{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
  .main h1{font-size:21px;color:var(--mint2);margin:5px 0 0;font-weight:600;word-break:break-word}
  .main h1 .u{font-size:12px;color:var(--dim);font-weight:400}
  .what{font-size:14px;color:var(--tx);line-height:1.7;margin:11px 0}
  .what b{color:var(--mint2);font-weight:500}
  .tune{font-size:13px;color:var(--mut);border-left:3px solid var(--mint);padding:7px 13px;background:var(--p2);border-radius:0 6px 6px 0;margin:13px 0}
  .tune b{color:var(--mint);font-weight:400}
  .viz{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:15px;margin:16px 0}
  .vctl{display:flex;align-items:center;gap:12px;margin:0 0 10px}
  .vctl label{font-size:12px;color:var(--mut);min-width:150px}
  .vctl output{font-size:13px;color:var(--tx);min-width:64px;font-weight:500;text-align:right}
  .vout{font-size:16px;color:var(--tx);margin:8px 0 12px}
  .vout b{font-weight:600}
  .info{font-size:13px;color:var(--mut);background:var(--p2);border:1px solid var(--line2);border-radius:6px;padding:13px 15px}
  .info b{color:var(--tx);font-weight:500}
  code{background:var(--p2);border:1px solid var(--line2);border-radius:3px;padding:1px 5px;font-size:12px;color:var(--mint2)}
  input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:4px;background:var(--line2);border-radius:2px;outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--mint);cursor:pointer}
  input[type=range]::-moz-range-thumb{width:15px;height:15px;border:none;border-radius:50%;background:var(--mint);cursor:pointer}
  svg{display:block;width:100%;height:auto}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="ttl"><span class="b">grid_strike</span> guide</div>
    <span class="tag">interactive</span>
    <span class="sp"></span>
    <a class="back" href="./index.html">◀ builder</a>
  </header>

  <div class="app">
    <nav class="side" id="side"></nav>
    <div class="main" id="main"></div>
  </div>
</div>

<script>
const $=i=>document.getElementById(i), val=i=>+$(i).value, out=(i,t)=>{$(i).textContent=t};
const L=(x1,y1,x2,y2,s,w,d)=>`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${s}" stroke-width="${w||1}"${d?` stroke-dasharray="${d}"`:''}/>`;
const T=(x,y,t,f,a,z)=>`<text x="${x}" y="${y}" fill="${f}" font-size="${z||9}"${a?` text-anchor="${a}"`:''} font-family="monospace">${t}</text>`;
const ctl=(id,label,mn,mx,st,v,fmt)=>`<div class="vctl"><label>${label}</label><input type="range" id="${id}" min="${mn}" max="${mx}" step="${st}" value="${v}"><output id="${id}O">${fmt(v)}</output></div>`;
const nfmt=v=>(+v).toLocaleString();

/* ---------- chart modules ---------- */
function chRange(host,active){
  host.innerHTML='<div class="viz">'+ctl('rStart','start_price',59000,64000,100,61500,nfmt)+ctl('rEnd','end_price',65500,71000,100,68000,nfmt)+ctl('rLimit','limit_price',57000,60500,100,59000,nfmt)+'<div class="vout" id="rOut"></div><div id="rLad"></div></div>';
  const draw=()=>{
    const start=val('rStart'),end=val('rEnd'),lim=val('rLimit');
    out('rStartO',nfmt(start));out('rEndO',nfmt(end));out('rLimitO',nfmt(lim));
    $('rOut').innerHTML=(start<end&&lim<start)?`<b style="color:#34d399">valid</b> — span ${((end-start)/start*100).toFixed(1)}%`:`<b style="color:#f87171">invalid</b> — need limit &lt; start &lt; end`;
    const W=620,H=250,padT=14,padB=14,padR=94,lo=Math.min(lim,start)*0.997,hi=end*1.003,y=p=>padT+(1-(p-lo)/(hi-lo))*(H-padT-padB);
    let s=`<svg viewBox="0 0 ${W} ${H}">`;
    if(start<end)s+=`<rect x="0" y="${y(end).toFixed(1)}" width="${W-padR}" height="${Math.max(0,y(start)-y(end)).toFixed(1)}" fill="#34d399" opacity="0.05"/>`;
    for(let k=1;k<4;k++){const p=start+k*(end-start)/4;s+=L(0,y(p).toFixed(1),W-padR,y(p).toFixed(1),'#2a3a3c',1,'3 3');}
    [['start_price',start,'#34d399','start'],['end_price',end,'#34d399','end'],['limit_price',lim,'#f87171','limit']].forEach(([k,p,c,lb])=>{
      const hot=active===k;if(hot)s+=`<rect x="0" y="${(y(p)-2).toFixed(1)}" width="${W-padR}" height="4" fill="${c}" opacity="0.16"/>`;
      s+=L(0,y(p).toFixed(1),W-padR,y(p).toFixed(1),c,hot?2.4:1.4)+T(W-padR+6,(y(p)+3).toFixed(1),lb+' '+nfmt(p),c,'',hot?11:9);});
    $('rLad').innerHTML=s+'</svg>';
  };
  ['rStart','rEnd','rLimit'].forEach(i=>$(i).addEventListener('input',draw));draw();
}
function chShape(host){
  host.innerHTML='<div class="viz">'+ctl('sTotal','total_amount (USDC)',20,400,10,50,v=>'$'+v)+ctl('sMin','min_order (USDC)',10,50,5,10,v=>'$'+v)+ctl('sRange','range width',2,18,1,16,v=>'±'+(v/2)+'%')+'<div class="vout" id="sOut"></div><div id="sLad"></div></div>';
  const draw=()=>{
    const total=val('sTotal'),minO=val('sMin'),rPct=val('sRange');
    out('sTotalO','$'+total);out('sMinO','$'+minO);out('sRangeO','±'+(rPct/2)+'%');
    const c=64700,start=c*(1-rPct/200),end=c*(1+rPct/200),levels=Math.max(1,Math.floor(total/minO)),gr=(end-start)/start*100,spacing=levels>1?gr/(levels-1):gr,gap=levels>1?(end-start)/(levels-1):0;
    $('sOut').innerHTML=`<b style="color:#5eead4">${levels}</b> levels · <b style="color:#5eead4">${spacing.toFixed(2)}%</b> apart · $${gap.toFixed(0)} between rungs`;
    const W=620,H=240,padT=12,padB=12,padR=78,y=p=>padT+(1-(p-start)/(end-start))*(H-padT-padB);
    let s=`<svg viewBox="0 0 ${W} ${H}"><rect x="0" y="${y(end).toFixed(1)}" width="${W-padR}" height="${(y(start)-y(end)).toFixed(1)}" fill="#34d399" opacity="0.05"/>`;
    (levels>1?Array.from({length:levels},(_,k)=>start+k*(end-start)/(levels-1)):[c]).forEach(p=>{s+=L(0,y(p).toFixed(1),W-padR,y(p).toFixed(1),'#34d399',1.2)+T(W-padR+6,(y(p)+3).toFixed(1),Math.round(p).toLocaleString(),'#6d817d');});
    s+=L(0,y(c).toFixed(1),W-padR,y(c).toFixed(1),'#5eead4',1,'4 3')+T(4,(y(c)-4).toFixed(1),'price','#5eead4');
    $('sLad').innerHTML=s+'</svg>';
  };
  ['sTotal','sMin','sRange'].forEach(i=>$(i).addEventListener('input',draw));draw();
}
function chTP(host){
  host.innerHTML='<div class="viz">'+ctl('pTp','take_profit',0.1,3,0.05,0.15,v=>(+v).toFixed(2)+'%')+'<div class="vout" id="pOut"></div><div id="pLad"></div></div>';
  const draw=()=>{
    const buy=63000,next=buy*1.02,tp=val('pTp'),sell=buy*(1+tp/100);out('pTpO',tp.toFixed(2)+'%');
    const W=620,H=150,padR=96,lo=buy*0.996,hi=next*1.004,y=p=>16+(1-(p-lo)/(hi-lo))*(H-32),near=Math.abs(sell-next)/next<0.0015,col=near?'#34d399':(sell>next?'#fbbf24':'#f87171');
    let s=`<svg viewBox="0 0 ${W} ${H}">`+L(120,y(buy).toFixed(1),W-padR,y(buy).toFixed(1),'#34d399',1.4)+T(114,(y(buy)+3).toFixed(1),'buy rung','#6d817d','end')+L(120,y(next).toFixed(1),W-padR,y(next).toFixed(1),'#2a3a3c',1.4,'3 3')+T(114,(y(next)+3).toFixed(1),'next rung','#4a5b58','end')+L(120,y(sell).toFixed(1),W-padR,y(sell).toFixed(1),col,1.6)+T(W-padR+6,(y(sell)+3).toFixed(1),'sell +'+tp+'%',col)+L(200,y(buy).toFixed(1),200,y(sell).toFixed(1),col,1);
    $('pLad').innerHTML=s+'</svg>';
    $('pOut').innerHTML=near?'<b style="color:#34d399">coherent grid</b> — sell lands on the next rung':sell<next?'<b style="color:#f87171">scalp</b> — sell far below next rung; the gap is unused':'<b style="color:#fbbf24">overshoot</b> — sell above the next rung';
  };
  $('pTp').addEventListener('input',draw);draw();
}
function chWindow(host){
  const rungs=[59500,62100,64700,67300,69900],PMIN=57500,PMAX=71500;
  host.innerHTML='<div class="viz">'+ctl('wPrice','market price',57500,71500,100,64700,nfmt)+ctl('wK','max_open_orders',1,5,1,2,v=>v)+'<div class="vout" id="wOut"></div><div id="wLad"></div></div>';
  const draw=()=>{
    const price=val('wPrice'),K=val('wK');out('wPriceO',nfmt(price));out('wKO',K);
    const live=new Set(rungs.map((r,i)=>({i,d:Math.abs(r-price)})).sort((a,b)=>a.d-b.d).slice(0,K).map(o=>o.i));
    $('wOut').innerHTML=`<b style="color:#34d399">${K}</b> of 5 rungs resting <span style="color:var(--mut);font-size:13px;font-weight:400">— the rest wait until price nears them</span>`;
    const W=620,H=240,padT=12,padB=12,padR=96,y=p=>padT+((PMAX-p)/(PMAX-PMIN))*(H-padT-padB);
    let s=`<svg viewBox="0 0 ${W} ${H}">`;
    rungs.forEach((r,i)=>{const on=live.has(i);s+=L(64,y(r).toFixed(1),W-padR,y(r).toFixed(1),on?'#34d399':'#2a3a3c',on?1.6:1,on?'':'3 3')+T(58,(y(r)+3).toFixed(1),r.toLocaleString(),'#6d817d','end')+T(W-padR+6,(y(r)+3).toFixed(1),on?'resting':'waiting',on?'#34d399':'#4a5b58');});
    s+=L(64,y(price).toFixed(1),W-padR,y(price).toFixed(1),'#60a5fa',1.4,'4 3')+T(58,(y(price)-4).toFixed(1),'price','#60a5fa','end');
    $('wLad').innerHTML=s+'</svg>';
  };
  ['wPrice','wK'].forEach(i=>$(i).addEventListener('input',draw));draw();
}
function chTime(host){
  host.innerHTML='<div class="viz">'+ctl('tFreq','order_frequency (s)',1,10,1,3,v=>v+'s')+ctl('tBatch','max_orders_per_batch',1,5,1,1,v=>v)+'<div class="vout" id="tOut"></div><div id="tLad"></div></div>';
  const draw=()=>{
    const RUNGS=5,f=val('tFreq'),b=val('tBatch'),rounds=Math.ceil(RUNGS/b),total=(rounds-1)*f;out('tFreqO',f+'s');out('tBatchO',b);
    $('tOut').innerHTML=`<b style="color:#60a5fa">${total}s</b> to arm all 5 <span style="color:var(--mut);font-size:13px;font-weight:400">— ${rounds} round${rounds>1?'s':''}, up to ${b} each</span>`;
    const W=620,H=86,axis=Math.max(total,1),tY=48;let s=`<svg viewBox="0 0 ${W} ${H}">`+L(14,tY,W-14,tY,'#2a3a3c',1.5),placed=0;
    for(let i=0;i<rounds;i++){const t=i*f,x=(14+(t/axis)*(W-40)).toFixed(1),add=Math.min(b,RUNGS-placed);placed+=add;s+=`<circle cx="${x}" cy="${tY}" r="5" fill="#60a5fa"/>`+T(x,tY-13,placed+'/5','#34d399','middle',11)+T(x,tY+18,t+'s','#6d817d','middle');}
    $('tLad').innerHTML=s+'</svg>';
  };
  ['tFreq','tBatch'].forEach(i=>$(i).addEventListener('input',draw));draw();
}
function chEcon(host){
  host.innerHTML='<div class="viz">'+ctl('eTp','take_profit %',0.05,3,0.05,0.5,v=>(+v).toFixed(2)+'%')+ctl('eFee','maker_fee %',0,0.05,0.005,0.015,v=>(+v).toFixed(3)+'%')+ctl('eFund','funding %/hr',0,0.01,0.00025,0.00125,v=>(+v).toFixed(5)+'%')+ctl('eHold','hold hrs',0,48,1,4,v=>v+'h')+'<div class="vout" id="eOut"></div><div id="eBar"></div></div>';
  const draw=()=>{
    const tp=val('eTp'),fee=2*val('eFee'),fund=val('eFund')*val('eHold'),cost=fee+fund,net=tp-cost;
    out('eTpO',tp.toFixed(2)+'%');out('eFeeO',val('eFee').toFixed(3)+'%');out('eFundO',val('eFund').toFixed(5)+'%');out('eHoldO',val('eHold')+'h');
    $('eOut').innerHTML=`net / cycle <b style="color:${net>0?'#34d399':'#f87171'}">${net>0?'+':''}${net.toFixed(3)}%</b> <span style="color:var(--mut);font-size:13px;font-weight:400">= gross ${tp.toFixed(2)}% − cost ${cost.toFixed(3)}%</span>`;
    const W=620,H=58,pad=4,scale=(W-2*pad)/Math.max(tp,cost,0.02),wN=Math.max(0,net)*scale,wFe=fee*scale,wFu=fund*scale;let x=pad,s=`<svg viewBox="0 0 ${W} ${H}">`+T(pad,11,'gross take_profit '+tp.toFixed(2)+'%','#6d817d','start',9);
    const seg=(w,c,lb)=>{if(w<=0.4)return;s+=`<rect x="${x.toFixed(1)}" y="18" width="${w.toFixed(1)}" height="28" rx="2" fill="${c}"/>`;if(w>38)s+=T((x+w/2).toFixed(1),36,lb,'#0a0e0f','middle',10);x+=w;};
    if(net>0){seg(wN,'#34d399','net');seg(wFe,'#fbbf24','fee');seg(wFu,'#f87171','fund');}else{seg(wFe,'#fbbf24','fee');seg(wFu,'#f87171','fund');s+=T((x+6).toFixed(1),36,'net negative','#f87171','start',10);}
    $('eBar').innerHTML=s+'</svg>';
  };
  ['eTp','eFee','eFund','eHold'].forEach(i=>$(i).addEventListener('input',draw));draw();
}
function chDraw(host){
  const start=59500,end=69900,lim=57600,n=5,per=50/n,prices=Array.from({length:n},(_,k)=>start+k*(end-start)/(n-1)),dd=X=>{let p=0;for(const q of prices)if(q>=X)p+=per/q*(X-q);return p;};
  host.innerHTML='<div class="viz">'+ctl('dP','price',lim,end,50,end,nfmt)+'<div class="vout" id="dOut"></div><div id="dLad"></div></div>';
  const draw=()=>{
    const X=val('dP'),loss=dd(X);out('dPO',nfmt(X));
    $('dOut').innerHTML=`unrealized at ${nfmt(X)}: <b style="color:${loss<-0.001?'#f87171':'#34d399'}">${loss>=0?'+':''}$${loss.toFixed(2)}</b>`;
    const W=620,H=170,padT=14,padB=20,padR=60,xLo=lim,xHi=end,pts=[];let mn=0;for(let i=0;i<=60;i++){const xx=xLo+(xHi-xLo)*i/60,p=dd(xx);pts.push([xx,p]);mn=Math.min(mn,p);}
    const yLo=mn*1.1||-1,PX=x=>((x-xLo)/(xHi-xLo))*(W-padR),PY=v=>padT+(1-(v-yLo)/(0-yLo))*(H-padT-padB);
    let d='';pts.forEach((p,k)=>d+=(k?'L':'M')+PX(p[0]).toFixed(1)+' '+PY(p[1]).toFixed(1));
    let s=`<svg viewBox="0 0 ${W} ${H}">`+L(0,PY(0).toFixed(1),W-padR,PY(0).toFixed(1),'#2a3a3c',1)+T(W-padR+4,(PY(0)+3).toFixed(1),'$0','#6d817d')+`<path d="${d}L${PX(end).toFixed(1)} ${PY(0).toFixed(1)}L${PX(lim).toFixed(1)} ${PY(0).toFixed(1)}Z" fill="#f87171" opacity="0.08"/><path d="${d}" fill="none" stroke="#f87171" stroke-width="1.6"/>`+L(PX(X).toFixed(1),padT,PX(X).toFixed(1),H-padB,'#5eead4',1)+T((PX(X)+3).toFixed(1),padT+9,'here','#5eead4')+T(2,H-4,'limit '+nfmt(lim),'#f87171','start')+T(W-padR,H-4,'end '+nfmt(end),'#6d817d','end');
    $('dLad').innerHTML=s+'</svg>';
  };
  $('dP').addEventListener('input',draw);draw();
}
const CHARTS={range:chRange,shape:chShape,tp:chTP,window:chWindow,timeline:chTime,econ:chEcon,draw:chDraw};

/* ---------- parameter data ---------- */
const GROUPS=[
 ['range',[
   ['start_price','low','range','Bottom rung of the grid — the lowest buy. Set it <b>below the current price</b> so the ladder sits under the market. With the limit below it, this is where accumulation begins.','drag the <b>start line on the chart</b>, or use the ±% buttons around a center price.'],
   ['end_price','high','range','Top rung. Must be above start_price. A wider start→end gap means a bigger range — and <b>wider spacing</b> for the same number of levels.','bracket where you expect price to oscillate. Too wide and rungs sit too far apart to fill.'],
   ['limit_price','stop','range','Invalidation stop, sitting <b>below start_price</b>. If price breaks through it, the grid <b>halts</b> — this is your downside cap.','set it at the price where your thesis is wrong. Draggable on the chart.'],
 ]],
 ['sizing',[
   ['total_amount_quote','USDC','shape','Total capital the grid deploys, split across rungs. This is the main lever on <b>how many levels</b> you get. At 1× leverage it is also the margin used.','<b>raise it for more, tighter levels</b>.'],
   ['min_order_amount_quote','USDC','shape','Notional per rung. Hyperliquid’s minimum is ~$10. Together with total_amount it sets the level count: <code>levels = total ÷ min_order</code>.','<b>lower it for more levels</b> from the same capital (down to ~$10).'],
   ['min_spread_between_orders','frac','shape','A <b>floor on spacing</b> (0.001 = 0.1%). Rungs can’t get closer than this. Only bites if you pack lots of capital into a tight range.','leave at 0.001 — rarely the binding limit.'],
 ]],
 ['take profit',[
   ['take_profit','%','tp','How far above its buy each rung sells. For a real grid it should ≈ <b>rung spacing</b>, so each rung sells at the next rung up. Far below spacing, you’re just scalping a rung and the wide spacing is cosmetic. The builder ⛓-links it to spacing by default.','leave <b>linked</b> for a coherent grid; unlink only for fixed small-TP scalping.'],
 ]],
 ['execution',[
   ['max_open_orders','','window','How many rungs <b>rest in the book at once</b>. Default 2 = only the two nearest price are live — a window that follows the market. Set it to your level count to arm the <b>full ladder</b>.','<b>= level count</b> to blanket the range; low (2) for a lean price-following pair.'],
   ['max_orders_per_batch','','timeline','How many orders are placed per round, nearest rungs first. A throttle so the bot doesn’t dump a wall of orders at once.','raise to arm many rungs faster; 1 is gentle.'],
   ['order_frequency','s','timeline','Minimum seconds between placement rounds. Only matters while <b>filling empty slots</b> (startup, or after fills) — does nothing once the ladder is full.','3s default is deliberately gentle. Lower to arm faster.'],
   ['activation_bounds','blank=null','info','Only place orders within this fraction of mid-price. Blank = always active across the whole range. Use it to keep orders concentrated near price.','leave blank unless you want a tighter active band than the full range.'],
   ['keep_position','','info','On stop, <b>keep the position you accumulated</b> instead of closing it out. Off = flatten on stop.','off for a clean study; on if you want to hold inventory through a stop.'],
 ]],
 ['market & account',[
   ['connector_name','','info','<code>hyperliquid_perpetual</code> = USDC-margined perps; <code>hyperliquid</code> = spot. Note BTC <b>spot</b> on Hyperliquid is illiquid — for BTC use the <b>perp</b>.','use the perp for BTC.'],
   ['trading_pair','','info','Market symbol. Perps use <code>BASE-USD</code> (e.g. <code>BTC-USD</code>); spot uses <code>BASE-USDC</code>.','match the connector’s format.'],
   ['side','','info','<code>BUY</code> = long grid — accumulates as price falls, sells into rallies. <code>SELL</code> = short grid, the mirror image.','BUY for a long-biased grid.'],
   ['leverage','x · perp','info','Perp only. <b>1× = no leverage</b> (safest, near-spot) — liquidation is remote. Higher multiplies both gains and liquidation risk. Ignored on spot.','keep <b>1×</b> for study.'],
   ['position_mode','','info','Hyperliquid supports <code>ONEWAY</code> only — <code>HEDGE</code> errors on start.','leave ONEWAY.'],
   ['id','','info','Config identifier — also the bot instance name once deployed.','any short label; must be unique per bot.'],
 ]],
 ['economics',[
   ['maker_fee','%','econ','Your maker fee, feeding the per-cycle estimate. HL perp base ≈ 0.015%. Both grid legs are LIMIT_MAKER, so a round trip costs ~<b>2×</b> this.','not written to config — set it to your real tier.'],
   ['funding_hr','%/hr','econ','Hourly funding (perp carry) used in the cost estimate. Auto-filled live; positive = longs pay. Held too long, it can flip a thin TP negative.','override only if you want a different assumption.'],
   ['hold_hrs','','econ','Average hours a rung’s position stays open — scales the funding cost per cycle. Longer holds = more carry drag.','estimate from how choppy the market is.'],
   ['balance','USDC','econ','Account equity, for the margin-use estimate. “use as balance” fills it from a fetched wallet.','set to your real perp balance.'],
 ]],
 ['risk',[
   ['drawdown','the tail','draw','A grid earns <b>many small wins</b> and risks <b>one big loss</b>: if price trends out of the range you keep buying into the fall, holding a position that bleeds down to the limit. Drag the price toward the limit to see the loss grow.','cap it with a sensible <b>limit_price</b>; keep leverage 1× so the loss can’t liquidate you.'],
 ]],
];

let current=null;
function renderSide(){
  let h='';
  GROUPS.forEach(([g,items])=>{h+=`<div class="g">${g}</div>`;items.forEach(([k])=>{h+=`<a data-k="${k}" class="${k===current?'on':''}">${k}</a>`;});});
  $('side').innerHTML=h;
  $('side').querySelectorAll('a').forEach(a=>a.onclick=()=>select(a.dataset.k));
}
function find(k){for(const[,items]of GROUPS)for(const it of items)if(it[0]===k)return it;}
function groupOf(k){for(const[g,items]of GROUPS)for(const it of items)if(it[0]===k)return g;}
function select(k){
  current=k;const[key,unit,chart,what,tune]=find(k);
  $('main').innerHTML=`<div class="crumb">${groupOf(k)}</div><h1>${key}${unit?` <span class="u">${unit}</span>`:''}</h1><div class="what">${what}</div>${tune?`<div class="tune">tune: ${tune}</div>`:''}<div id="host"></div>`;
  const host=$('host');
  if(CHARTS[chart])CHARTS[chart](host,key);
  else host.innerHTML=`<div class="info">This is a <b>configuration field</b> — no live chart needed. Set it and move on; the notes above cover the choice.</div>`;
  renderSide();
}
renderSide();select('start_price');
</script>
